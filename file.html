<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>



<div class="game">
    <div class="top-bar">
        <a class="cool-link" href="https://chatgpt.com/" target="_blank">🤖 Try ChatGPT</a>
    </div>
    <h1>🎯 Number Guessing Game</h1>
    <p class="subtitle">Guess a number between <b>1 and 100</b></p>
    <div class="input-row">
        <input type="number" id="guess" placeholder="Enter your guess" min="1" max="100">
        <button onclick="checkGuess()">Check</button>
    </div>
    <p id="message"></p>
    <div class="scoreboard">
        <span id="highscore-label">🏆 High Score: <span id="highscore">--</span></span>
        <span id="attempts-label">🔢 Attempts: <span id="attempts">0</span></span>
    </div>
</div>

<script>
// Update high score and attempts on page load and after each guess
function updateScoreboard() {
    const highScore = localStorage.getItem('highScore') || '--';
    document.getElementById('highscore').textContent = highScore;
    document.getElementById('attempts').textContent = window.attempts || 0;
}
updateScoreboard();
setInterval(updateScoreboard, 500);
</script>
<script src="script.js"></script>
</body>
</html>
